<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot Gemini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-5">
    <div class="chat-card">
        <h2 class="text-center mb-4">
            AI Chatbot Gemini
        </h2>
        <div class="text-end mb-2"><a href="/history">Lihat Riwayat Percakapan</a></div>
        <form method="POST">
            <textarea
                name="prompt"
                class="form-control mb-3"
                rows="5"
                placeholder="Tanyakan apa saja..."
                required></textarea>
            <button class="btn btn-primary w-100">
                Kirim Pertanyaan
            </button>
        </form>
        {% if response %}
        <div class="answer-box mt-4">
            <h5>Jawaban AI</h5>
            <hr>
            <p>{{ response }}</p>
        </div>
        {% endif %}
    </div>
</div>
</body>
</html>
