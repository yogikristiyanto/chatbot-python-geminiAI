<!DOCTYPE html>
<html>
<head>
    <title>Riwayat Percakapan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-5">
    <h3>Riwayat Percakapan</h3>
    <div class="mb-3">
        <a class="btn btn-secondary" href="/">Kembali</a>
        <a class="btn btn-success" href="/export">Ekspor CSV</a>
    </div>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Waktu</th>
            <th>Pesan Pengguna</th>
            <th>Respons AI</th>
        </tr>
        </thead>
        <tbody>
        {% for c in conversations %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.timestamp }}</td>
            <td style="white-space:pre-wrap">{{ c.user_message }}</td>
            <td style="white-space:pre-wrap">{{ c.bot_response }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
